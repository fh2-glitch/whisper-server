<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Test Whisper WAV</title>
</head>
<body>

  <button id="start">🎤 Prononcer</button>
  <p id="result"></p>

  <script>
    // colle ici tout le script WAV
  </script>

</body>
</html>
<script>
let audioContext;
let processor;
let input;
let stream;
let audioData = [];
let sampleRate;

function encodeWAV(samples, sampleRate) {
  const buffer = new ArrayBuffer(44 + samples.length * 2);
  const view = new DataView(buffer);

  function writeString(offset, string) {
    for (let i = 0; i < string.length; i++) {
      view.setUint8(offset + i, string.charCodeAt(i));
    }
  }

  let offset = 0;

  writeString(offset, "RIFF"); offset += 4;
  view.setUint32(offset, 36 + samples.length * 2, true); offset += 4;
  writeString(offset, "WAVE"); offset += 4;
  writeString(offset, "fmt "); offset += 4;
  view.setUint32(offset, 16, true); offset += 4;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint16(offset, 1, true); offset += 2;
  view.setUint32(offset, sampleRate, true); offset += 4;
  view.setUint32(offset, sampleRate * 2, true); offset += 4;
  view.setUint16(offset, 2, true); offset += 2;
  view.setUint16(offset, 16, true); offset += 2;
  writeString(offset, "data"); offset += 4;
  view.setUint32(offset, samples.length * 2, true); offset += 4;

  for (let i = 0; i < samples.length; i++, offset += 2) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }

  return new Blob([view], { type: "audio/wav" });
}

document.getElementById("start").onclick = async () => {
  const result = document.getElementById("result");
  result.innerHTML = "Préparation du micro...";

  audioData = [];

  stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  audioContext = new AudioContext();
  sampleRate = audioContext.sampleRate;

  input = audioContext.createMediaStreamSource(stream);
  processor = audioContext.createScriptProcessor(4096, 1, 1);

  processor.onaudioprocess = function(e) {
    const channelData = e.inputBuffer.getChannelData(0);
    audioData.push(new Float32Array(channelData));
  };

  input.connect(processor);
  processor.connect(audioContext.destination);

  result.innerHTML = "Attends...";

  setTimeout(() => {
    result.innerHTML = "🎤 Parle maintenant";

    setTimeout(async () => {
      processor.disconnect();
      input.disconnect();
      stream.getTracks().forEach(track => track.stop());
      await audioContext.close();

      let length = audioData.reduce((acc, cur) => acc + cur.length, 0);
      let samples = new Float32Array(length);

      let offset = 0;
      for (let chunk of audioData) {
        samples.set(chunk, offset);
        offset += chunk.length;
      }

      const wavBlob = encodeWAV(samples, sampleRate);

      const formData = new FormData();
      formData.append("audio", wavBlob, "audio.wav");

      result.innerHTML = "⏳ Reconnaissance en cours...";

      const response = await fetch("http://localhost:3000/recognize", {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      result.innerHTML =
         `<b>Texte reconnu :</b> ${data.text}<br>
		  <b>Normalisé :</b> ${data.normalized}`;

    }, 5000);

  }, 1000);
};
</script>
